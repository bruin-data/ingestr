name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  INSTALL_URL: https://getbruin.com/install/ingestr
  INGESTR_DISABLE_TELEMETRY: "true"
  DISABLE_TELEMETRY: "true"

jobs:
  integration-tests:
    strategy:
      matrix:
        platform:
          - depot-ubuntu-latest
          - macos-15
        suite: ["test", "test-integration"]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install ODBC build dependencies
        if: startsWith(matrix.platform, 'depot-ubuntu')
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev
      - name: Run test suite
        run: make ${{ matrix.suite }}

  prepare-darwin:
    runs-on: depot-ubuntu-latest-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: cache darwin
        uses: actions/cache@v4
        with:
          path: dist/darwin
          key: darwin-${{ env.sha_short }}
      - name: Run GoReleaser
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --privileged   -v /var/run/docker.sock:/var/run/docker.sock -e INGESTR_DISABLE_TELEMETRY=true -e DISABLE_TELEMETRY=true -e GGOOS=darwin -e GORELEASER_KEY=${{ secrets.GORELEASER_KEY }} -e COMMIT_SHA=${{ github.sha }} -e VERSION=${{ github.ref_name }} -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} -v $(pwd):/src -w /src goreleaser/goreleaser-cross-pro:v1.23 release --clean --split --verbose


  prepare-linux:
    runs-on: depot-ubuntu-latest-8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: cache linux
        uses: actions/cache@v4
        with:
          path: dist/linux
          key: linux-${{ env.sha_short }}
      - name: Run GoReleaser
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          docker run --privileged   -v /var/run/docker.sock:/var/run/docker.sock -e INGESTR_DISABLE_TELEMETRY=true -e DISABLE_TELEMETRY=true -e GGOOS=linux -e GORELEASER_KEY=${{ secrets.GORELEASER_KEY }} -e COMMIT_SHA=${{ github.sha }} -e VERSION=${{ github.ref_name }} -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} -v $(pwd):/src -w /src goreleaser/goreleaser-cross-pro:v1.23 sh -lc "apt-get update && apt-get install -y unixodbc-dev && goreleaser release --clean --split --verbose"


  release-unix:
    runs-on: depot-ubuntu-latest
    needs: [prepare-linux, prepare-darwin, integration-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: dist/linux
          key: linux-${{ env.sha_short }}
      - uses: actions/cache@v4
        with:
          path: dist/darwin
          key: darwin-${{ env.sha_short }}
      - uses: goreleaser/goreleaser-action@v3
        with:
          distribution: goreleaser-pro
          version: v2.3.2
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

  release-windows:
    runs-on: depot-windows-latest
    needs: [prepare-linux, prepare-darwin, integration-tests]
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gcc-libs
            mingw-w64-ucrt-x86_64-winpthreads

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.3.2
          distribution: goreleaser-pro
          args: release --clean --split
        env:
          # existing env
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          VERSION: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GGOOS: windows

          # ✅ make Windows CGO use MinGW-UCRT and link runtime statically
          CGO_ENABLED: 1
          CC: x86_64-w64-mingw32-gcc
          CGO_LDFLAGS: "-static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -Wl,-Bdynamic"

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/windows/ingestr_Windows_x86_64.zip
          asset_name: ingestr_Windows_x86_64.zip
          tag: ${{ github.ref }}
          overwrite: false
          make_latest: false
          prerelease: false

  release-pip:
    runs-on: depot-ubuntu-latest
    needs: [release-windows, release-unix]
    steps:
      - uses: actions/checkout@v4
      - name: download binaries
        id: fetch
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: ingestr_*
          out-file-path: artifacts
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install --quiet build wheel twine

      - name: Build pip wheels
        run: |
          set -euo pipefail

          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          export SETUPTOOLS_SCM_PRETEND_VERSION="$VERSION"
          echo "building wheels for ingestr $VERSION"

          mkdir -p dist
          cp pyproject.toml pyproject.toml.orig

          build_one() {
            local archive=$1 bin_name=$2 platform_tag=$3
            rm -rf bin build
            mkdir -p bin
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C bin "$bin_name" ;;
              *.zip)    unzip -qoj "$archive" "$bin_name" -d bin ;;
            esac
            chmod +x "bin/$bin_name"

            cp pyproject.toml.orig pyproject.toml
            sed -i "s|\"bin/ingestr\" = \"ingestr\"|\"bin/$bin_name\" = \"$bin_name\"|" pyproject.toml

            python -m build --wheel --outdir dist >/dev/null
            local wheel
            wheel=$(ls -t dist/ingestr-"$VERSION"-py*-none-any.whl | head -1)
            python -m wheel tags --remove --platform-tag="$platform_tag" "$wheel" >/dev/null
          }

          build_one artifacts/ingestr_Linux_x86_64.tar.gz   ingestr     manylinux2014_x86_64
          build_one artifacts/ingestr_Linux_arm64.tar.gz    ingestr     manylinux2014_aarch64
          build_one artifacts/ingestr_Darwin_x86_64.tar.gz  ingestr     macosx_10_15_x86_64
          build_one artifacts/ingestr_Darwin_arm64.tar.gz   ingestr     macosx_11_0_arm64
          build_one artifacts/ingestr_Windows_x86_64.zip    ingestr.exe win_amd64

          mv pyproject.toml.orig pyproject.toml
          ls -la dist/

      - name: Upload to pip
        run: twine upload --verbose dist/*
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_INGESTR_TOKEN }}
          
  install-windows:
    runs-on: depot-windows-latest
    name: Installer Script on Windows
    needs: [release-windows, release-unix]
    steps:
      - uses: actions/checkout@v4
      - name: Show directories
        shell: bash
        run: pwd && cd && pwd
      - name: Use install script
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Installer script test attempt ${attempt}/${max_attempts} (Windows)"
            if curl -LsSf $INSTALL_URL | sh -s -- -d "${GITHUB_REF##*/}" \
              &&  ~/.local/bin/ingestr --version; then
              exit 0
            fi

            if [ "${attempt}" -lt "${max_attempts}" ]; then
              backoff_seconds=$((attempt * 15))
              echo "Attempt ${attempt} failed, retrying in ${backoff_seconds}s..."
              sleep "${backoff_seconds}"
            fi
          done

          echo "Installer script tests failed after ${max_attempts} attempts on Windows." >&2
          exit 1

  install-unix:
    runs-on: ubuntu-latest
    name: Installer Script on Linux
    needs: [release-windows, release-unix]
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag from ref
        id: extract_tag
        run: |
          ref_name="${GITHUB_REF##*/}"
          echo "tag=${ref_name}" >> $GITHUB_ENV
      - name: Use install script
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Installer script test attempt ${attempt}/${max_attempts} (Linux)"
            if curl -LsSf $INSTALL_URL | sh -s -- -d "${{ env.tag }}" \
              &&  ingestr --version; then
              exit 0
            fi

            if [ "${attempt}" -lt "${max_attempts}" ]; then
              backoff_seconds=$((attempt * 15))
              echo "Attempt ${attempt} failed, retrying in ${backoff_seconds}s..."
              sleep "${backoff_seconds}"
            fi
          done

          echo "Installer script tests failed after ${max_attempts} attempts on Linux." >&2
          exit 1

  release:
    runs-on: ubuntu-latest
    needs: [install-unix, install-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag from ref
        id: extract_tag
        run: |
          ref_name="${GITHUB_REF##*/}"
          echo "tag=${ref_name}" >> $GITHUB_ENV
      - name: Release promote to latest
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.tag }}
          prerelease: false
          make_latest: true
          clear_attachments: false
