name: CI Checks

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || (github.ref == 'refs/heads/main' && github.sha || github.ref) }}
  cancel-in-progress: true


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bruin-data/ingestr

jobs:
  test:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - run: make test

  end2end:
    runs-on: depot-ubuntu-24.04-4
    env:
      # Skip the testcontainers reaper (ryuk) container. Safe on ephemeral CI
      # runners — they're destroyed after the job, no orphan-container risk.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Pre-pull testcontainer images (background)
        run: |
          # Pull in parallel with go-test compilation; testcontainers will
          # find the image already cached and skip its own pull.
          for img in mongo:7 postgres:16-alpine mysql:8.0 mcr.microsoft.com/mssql/server:2022-latest clickhouse/clickhouse-server:24.3 amazon/dynamodb-local:latest crate:latest minio/minio:latest rabbitmq:3-management-alpine; do
            docker pull "$img" >/dev/null 2>&1 &
          done

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Run integration tests
        run: make test-integration

  dockerBuild:
    runs-on: depot-ubuntu-latest
    name: Docker Build
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bruin-data
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Depot
        uses: depot/setup-action@v1

      - name: Build Docker image
        uses: depot/build-push-action@v1
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
            BRANCH_NAME=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

  lint:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Install linting tools
        run: make setup
      - name: Check the formatting and linting
        run: make lint-ci
  
  # This will be part of release pipeline. Put here for testing.
  release-pip:
    runs-on: depot-ubuntu-latest
    steps:
      - name: fetch
        uses: robinraju/release-downloader@v1
        with:
          tag: v0.15.5
          tarBall: true
          zipBall: true
      
      - name: list binaries
        run: echo ${{ steps.fetch.outputs.downloaded_files }}
