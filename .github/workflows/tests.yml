name: CI Checks

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'resources/**'
      - 'templates/**'
      - 'install.sh'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'


concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || (github.ref == 'refs/heads/main' && github.sha || github.ref) }}
  cancel-in-progress: true


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bruin-data/ingestr

jobs:
  test:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - run: make test

  end2end:
    runs-on: depot-ubuntu-24.04-4
    env:
      # Skip the testcontainers reaper (ryuk) container. Safe on ephemeral CI
      # runners — they're destroyed after the job, no orphan-container risk.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Pre-pull testcontainer images (background)
        run: |
          # Pull in parallel with go-test compilation; testcontainers will
          # find the image already cached and skip its own pull.
          for img in mongo:7 postgres:16-alpine mysql:8.0 mcr.microsoft.com/mssql/server:2022-latest clickhouse/clickhouse-server:24.3 amazon/dynamodb-local:latest crate:latest minio/minio:latest rabbitmq:3-management-alpine; do
            docker pull "$img" >/dev/null 2>&1 &
          done

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Run integration tests
        run: make test-integration

  dockerBuild:
    runs-on: depot-ubuntu-latest
    name: Docker Build
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: bruin-data
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Depot
        uses: depot/setup-action@v1

      - name: Build Docker image
        uses: depot/build-push-action@v1
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
            BRANCH_NAME=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

  lint:
    runs-on: depot-ubuntu-24.04-4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: "go.sum"
      - name: Install linting tools
        run: make setup
      - name: Check the formatting and linting
        run: make lint-ci
  
  # This will be part of release pipeline. Put here for testing.
  release-pip:
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: download binaries
        id: fetch
        uses: robinraju/release-downloader@v1
        with:
          tag: v0.15.5
          fileName: ingestr_*
          out-file-path: artifacts
      
      - name: list binaries
        run: find artifacts -type f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install --quiet build wheel

      - name: Build pip wheels
        run: |
          set -euo pipefail

          VERSION=$(ls artifacts/ingestr_*_checksums.txt | head -1 \
            | xargs -n1 basename | sed -E 's/^ingestr_(.+)_checksums\.txt$/\1/')
          export SETUPTOOLS_SCM_PRETEND_VERSION="$VERSION"
          echo "building wheels for ingestr $VERSION"

          mkdir -p dist
          cp pyproject.toml pyproject.toml.orig

          build_one() {
            local archive=$1 bin_name=$2 platform_tag=$3
            rm -rf bin build
            mkdir -p bin
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C bin "$bin_name" ;;
              *.zip)    unzip -qoj "$archive" "$bin_name" -d bin ;;
            esac
            chmod +x "bin/$bin_name"

            cp pyproject.toml.orig pyproject.toml
            sed -i "s|\"bin/ingestr\" = \"ingestr\"|\"bin/$bin_name\" = \"$bin_name\"|" pyproject.toml

            python -m build --wheel --outdir dist >/dev/null
            local wheel
            wheel=$(ls -t dist/ingestr-"$VERSION"-py*-none-any.whl | head -1)
            python -m wheel tags --remove --platform-tag="$platform_tag" "$wheel" >/dev/null
          }

          build_one artifacts/ingestr_Linux_x86_64.tar.gz   ingestr     manylinux2014_x86_64
          build_one artifacts/ingestr_Linux_arm64.tar.gz    ingestr     manylinux2014_aarch64
          build_one artifacts/ingestr_Darwin_x86_64.tar.gz  ingestr     macosx_10_15_x86_64
          build_one artifacts/ingestr_Darwin_arm64.tar.gz   ingestr     macosx_11_0_arm64
          build_one artifacts/ingestr_Windows_x86_64.zip    ingestr.exe win_amd64

          mv pyproject.toml.orig pyproject.toml
          ls -la dist/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pip-wheels
          path: dist/*.whl
