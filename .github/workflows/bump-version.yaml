name: Bump Version

on:
  workflow_dispatch:

jobs:
  bump_version:
    name: Bump Version
    runs-on: depot-ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Set branch name
        id: extract_branch
        run: echo "branch_name=$(echo ${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}})" >> $GITHUB_OUTPUT
      - name: Bump version and push tag
        id: bump_version
        uses: anothrNick/github-tag-action@ce4b5ffa38e072fa7a901e417253c438fcc2ccce # 1.36.0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          PRERELEASE: true
          RELEASE_BRANCHES: ${{ steps.extract_branch.outputs.branch_name }}
